# Pre-commit hooks for the azuremlops monorepo.
#
# Install:   pip install pre-commit && pre-commit install
# Manual run: pre-commit run --all-files
# Update:    pre-commit autoupdate

repos:
  # =====================================================================
  # General hygiene
  # =====================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^.github/ISSUE_TEMPLATE/
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # =====================================================================
  # Secrets scanning — gitleaks
  # =====================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # =====================================================================
  # Python — ruff (lint + format)
  # =====================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # =====================================================================
  # Markdown — markdownlint
  # =====================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.yaml]
        exclude: ^(LICENSE|.github/ISSUE_TEMPLATE/|docs/adr/0000-template\.md)

  # =====================================================================
  # YAML — yamllint
  # =====================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]

  # =====================================================================
  # Bicep — local hook calling `az bicep lint`
  # =====================================================================
  # Only runs when .bicep files change. Requires Azure CLI installed.
  - repo: local
    hooks:
      - id: bicep-lint
        name: bicep lint
        entry: bash -c 'for f in "$@"; do az bicep lint --file "$f"; done' --
        language: system
        files: \.bicep$
        require_serial: false

  # =====================================================================
  # Conventional commits — enforce commit message format
  # =====================================================================
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []   # accept all default types

# =========================================================================
# CI integration: GitHub Actions runs `pre-commit run --all-files` on every
# PR. Local hooks (bicep-lint) are skipped in CI; CI runs equivalent steps
# directly via `az bicep lint`.
# =========================================================================
default_install_hook_types:
  - pre-commit
  - commit-msg
