version: 2
updates:
  # ---------- GitHub Actions ----------
  # Update workflow action versions weekly; security updates immediately.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      actions-minor:
        update-types:
          - "minor"
          - "patch"
    reviewers:
      - "sowthri-industrial-ai"

  # ---------- Python dependencies (workload projects) ----------
